services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aarshjul}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - aarshjul-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aarshjul}"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    image: ${AARSHJUL_IMAGE:-aarshjul:local}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-aarshjul}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3002}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-replace-with-long-random-secret}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@example.com}
      SYSTEM_ADMIN_EMAILS: ${SYSTEM_ADMIN_EMAILS:-sysadmin@example.com}
      SYSTEM_ADMIN_GROUP_IDS: ${SYSTEM_ADMIN_GROUP_IDS:-}
      SYSTEM_ADMIN_LOCAL_USERNAME: ${SYSTEM_ADMIN_LOCAL_USERNAME:-sysadmin}
      SYSTEM_ADMIN_LOCAL_PASSWORD: ${SYSTEM_ADMIN_LOCAL_PASSWORD:-sysadmin}
      SYSTEM_ADMIN_LOCAL_EMAIL: ${SYSTEM_ADMIN_LOCAL_EMAIL:-sysadmin@local}
      SYSTEM_ADMIN_LOCAL_NAME: ${SYSTEM_ADMIN_LOCAL_NAME:-System Admin}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID:-}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET:-}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      REMINDER_JOB_SECRET: ${REMINDER_JOB_SECRET:-replace-with-job-secret}
      AUTO_DB_PUSH: ${AUTO_DB_PUSH:-true}
      DB_STARTUP_RETRIES: ${DB_STARTUP_RETRIES:-20}
      DB_STARTUP_WAIT_SECONDS: ${DB_STARTUP_WAIT_SECONDS:-2}
    ports:
      - "${APP_PORT:-3002}:3000"

volumes:
  aarshjul-postgres-data:
